

exec-once = $HOME/.config/hypr/initial-boot.sh

### Sourcing external config files ###
$configs = $HOME/.config/hypr/configs # Default Configs directory path
$hyprland = $HOME/.config/hypr/hyprland
$scripts = $HOME/.config/hypr/scripts

source = $hyprland/keybindings.conf # Pre-configured keybinds

# Load defaults, then user additions/overrides
source= $hyprland/startup.conf 

source= $hyprland/env.conf # Environment variables (defaults)

# For laptop related
# source= $configs/Laptops.conf 

# Load defaults, then user additions
source= $hyprland/window-rules.conf # Window Rules and Layer Rules (defaults)

source= $hyprland/general.conf # Environment variables (defaults)

# Wallpaper
exec = awww img ~/Pictures/wallpaper/wallpaper.GIF --transition-step 5 --transition-fps 10 --transition-type simple
