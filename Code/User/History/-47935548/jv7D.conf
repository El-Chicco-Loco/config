

exec-once = $HOME/.config/hypr/initial-boot.sh

### Sourcing external config files ###
$configs = $HOME/.config/hypr/configs # Default Configs directory path
$hyprland = $HOME/.config/hypr/hyprland
$scripts = $HOME/.config/hypr/scripts

source = $hyprland/keybindings.conf
source= $hyprland/startup.conf 
source= $hyprland/env.conf
source= $hyprland/window-rules.conf
source= $hyprland/general.conf

# Wallpaper
# exec = awww img ~/Pictures/wallpaper/wallpaper.GIF --transition-step 5 --transition-fps 10 --transition-type simple
