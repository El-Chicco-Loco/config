# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# Default Keybinds
# visit https://wiki.hyprland.org/Configuring/Binds/ for more info

# /* ---- ✴️ Variables ✴️ ---- */  #
$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

#### STANDAR ####
# Common shortcuts
bindd = $mainMod, Q, close focused window, killactive
bindd = $mainMod, B, open default browser, exec, brave
bindd = $mainMod, T, Open terminal, exec, kitty
bindd = $mainMod, E, file manager, exec, thunar
bindd = $mainMod, W, toggle floating, togglefloating

# FEATURES / EXTRAS
bindd = $mainMod, H, help / cheat sheet, exec, $scriptsDir/KeyHints.sh
bindd = $mainMod ALT, R, refresh bar and menus, exec, $scriptsDir/Refresh.sh
bindd = $mainMod ALT, E, emoji menu, exec, $scriptsDir/RofiEmoji.sh
bindd = $mainMod, S, web search, exec, $scriptsDir/RofiSearch.sh
bindd = $mainMod CTRL, S, window switcher, exec, rofi -show window
bindd = $mainMod ALT, O, toggle blur, exec, $scriptsDir/ChangeBlur.sh
bindd = $mainMod SHIFT, G, toggle game mode, exec, $scriptsDir/GameMode.sh
bindd = $mainMod ALT, L, toggle master/dwindle layout, exec, $scriptsDir/ChangeLayout.sh
bindd = $mainMod ALT, V, clipboard manager, exec, $scriptsDir/ClipManager.sh
bindd = $mainMod CTRL, R, rofi theme selector, exec, $scriptsDir/RofiThemeSelector.sh
bindd = $mainMod CTRL SHIFT, R, rofi theme selector (modified), exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh

bindd = $mainMod, F, fullscreen, fullscreen
bindd = $mainMod, M, maximize window, fullscreen, 1
bindd = $mainMod, SPACE, Float current window, togglefloating,
bindd = $mainMod ALT, SPACE, Float all windows, exec, hyprctl dispatch workspaceopt allfloat
bindd = $mainMod SHIFT, Return, DropDown terminal, exec, $scriptsDir/Dropterminal.sh $term

bindd = $mainMod, 1, navigate to workspace 1 , workspace, 1
bindd = $mainMod, 2, navigate to workspace 2 , workspace, 2
bindd = $mainMod, 3, navigate to workspace 3 , workspace, 3
bindd = $mainMod, 4, navigate to workspace 4 , workspace, 4
bindd = $mainMod, 5, navigate to workspace 5 , workspace, 5
bindd = $mainMod, 6, navigate to workspace 6 , workspace, 6
bindd = $mainMod, 7, navigate to workspace 7 , workspace, 7
bindd = $mainMod, 8, navigate to workspace 8 , workspace, 8
bindd = $mainMod, 9, navigate to workspace 9 , workspace, 9
bindd = $mainMod, 0, navigate to workspace 10 , workspace, 10

bindd = $mainMod Control, Right, change active workspace forwards  , workspace, r+1
bindd = $mainMod Control, Left, change active workspace backwards , workspace, r-1

bindd = $mainMod Control, Down, navigate to the nearest empty workspace , workspace, empty

# Move focused window to a workspace
bindd = $mainMod Shift, 1, move to workspace 1 , movetoworkspace, 1
bindd = $mainMod Shift, 2, move to workspace 2 , movetoworkspace, 2
bindd = $mainMod Shift, 3, move to workspace 3 , movetoworkspace, 3
bindd = $mainMod Shift, 4, move to workspace 4 , movetoworkspace, 4
bindd = $mainMod Shift, 5, move to workspace 5 , movetoworkspace, 5
bindd = $mainMod Shift, 6, move to workspace 6 , movetoworkspace, 6
bindd = $mainMod Shift, 7, move to workspace 7 , movetoworkspace, 7
bindd = $mainMod Shift, 8, move to workspace 8 , movetoworkspace, 8
bindd = $mainMod Shift, 9, move to workspace 9 , movetoworkspace, 9
bindd = $mainMod Shift, 0, move to workspace 10 , movetoworkspace, 10

# Move focused window to a relative workspace
bindd = $mainMod Shift, Right, move window to next relative workspace , movetoworkspace, r+1
bindd = $mainMod Shift, Left, move window to previous relative workspace , movetoworkspace, r-1

$hc=Hardware Controls
$d=[$hc|Audio]
binddl  = , F10, $d toggle mute output , exec, $scrPath/volumecontrol.sh -o m # toggle audio mute
binddl  = , XF86AudioMute,$d  toggle mute output, exec, $scrPath/volumecontrol.sh -o m # toggle audio mute
binddel = , F11, $d decrease volume , exec, $scrPath/volumecontrol.sh -o d # decrease volume
binddel = , F12, $d increase volume , exec, $scrPath/volumecontrol.sh -o i # increase volume
binddl  = , XF86AudioMicMute,$d un/mute microphone  , exec, $scrPath/volumecontrol.sh -i m # toggle microphone mute
binddel = , XF86AudioLowerVolume, $d decrease volume , exec, $scrPath/volumecontrol.sh -o d # decrease volume
binddel = , XF86AudioRaiseVolume, $d increase volume , exec, $scrPath/volumecontrol.sh -o i # increase volume

$d=[$hc|Media]
binddl  = , XF86AudioPlay,$d play media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioPause,$d pause media, exec, playerctl play-pause # toggle between media play and pause
binddl  = , XF86AudioNext,$d next media  , exec, playerctl next # media next
binddl  = , XF86AudioPrev,$d  previous media , exec, playerctl previous # media previous

$d=[$hc|Brightness]
binddel = , XF86MonBrightnessUp, $d increase brightness , exec, $scrPath/brightnesscontrol.sh i # increase brightness
binddel = , XF86MonBrightnessDown, $d decrease brightness , exec, $scrPath/brightnesscontrol.sh d # decrease brightness