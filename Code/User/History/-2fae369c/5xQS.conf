
### wallpaper stuff ###
exec-once = awww-daemon --format xrgb

### Startup ###
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &
exec-once = $scripts/Polkit.sh
exec-once = nm-applet --indicator
exec-once = nm-tray   # For ubuntu
exec-once = swaync

exec-once = waybar
exec-once = qs -c overview  # Quickshell Overview
exec-once = hypridle
exec-once = $scripts/Hyprsunset.sh init

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = blueman-applet
exec-once = $scripts/KeybindsLayoutInit.sh
